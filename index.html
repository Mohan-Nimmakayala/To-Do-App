<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced To-Do App</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 450px;
        background: #ffffff;
        padding: 28px;
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.12);
        border: 1px solid #e5e7eb;
      }

      h1 {
        text-align: center;
        margin-bottom: 22px;
        color: #111827;
        font-size: 30px;
        letter-spacing: -0.5px;
      }

      .input-box {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
      }

      input {
        flex: 1;
        padding: 13px 14px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        outline: none;
        font-size: 15px;
        transition: 0.2s ease;
      }

      input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      }

      button {
        padding: 12px 18px;
        border: none;
        background: #4f46e5;
        color: white;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s ease;
      }

      button:hover {
        background: #4338ca;
        transform: translateY(-1px);
      }

      .task {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        background: #f9fafb;
        padding: 14px;
        margin-top: 14px;
        border-radius: 14px;
        border: 1px solid #e5e7eb;
      }

      .task h3 {
        color: #1f2937;
        font-size: 16px;
        font-weight: 500;
        word-break: break-word;
      }

      .delete-btn {
        background: #ef4444;
        padding: 10px 14px;
      }

      .delete-btn:hover {
        background: #dc2626;
      }

      @media (max-width: 480px) {
        .input-box {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>To-Do App</h1>
      <div class="input-box">
        <input type="text" placeholder="Enter task" id="inp" />
        <button onclick="addtask()">Add</button>
      </div>
      <div id="tasklist"></div>
    </div>
    <script>
      let todotasks = JSON.parse(localStorage.getItem("todolist")) || [];
      displaytask();
      function addtask() {
        let inp = document.getElementById("inp");
        if (inp.value == "") { 
          alert("please enter value");
          return;
        }
        todotasks.push(inp.value);
        localStorage.setItem("todolist", JSON.stringify(todotasks));
        inp.value = "";
        displaytask();
      }
      function displaytask() {
        let tasklist = document.getElementById("tasklist");
        tasklist.innerHTML = todotasks
          .map((val, ind) => {
            return `c 
          <div class='task'>
            <h3>${val}</h3>
            <button class='delete-btn' onclick='deletetask(${ind})'>delete</button>
            </div>`;
          })
          .join("");
      } 
      function deletetask(index) {
        todotasks = todotasks.filter((val, ind) => {
          return index != ind;
        });
        localStorage.setItem("todolist", JSON.stringify(todotasks));
        displaytask();
      }
    </script>
  </body>
</html>
